name: dang-reel

on:
  schedule:
    - cron: '*/30 * * * *'   # tự quét Base mỗi 30 phút, đăng bài đến giờ (tắt máy vẫn chạy)
  repository_dispatch:
    types: [dang-reel]        # gọi qua HTTP: {"event_type":"dang-reel", ...}
  workflow_dispatch:          # cho phép bấm chạy tay trên GitHub UI
    inputs:
      dry_run:
        description: "Chỉ liệt kê, không đăng thật"
        type: boolean
        default: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Đăng Facebook (Lark Base 14.3 → nhiều Fanpage theo cột Page + Loại mỗi dòng)
        env:
          # ---- Bí mật: khai trong GitHub Secrets ----
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
          # ---- Không bí mật: cho phép client_payload ghi đè (trống -> dùng default trong script) ----
          LARK_APP_ID: ${{ github.event.client_payload.lark_app_id }}
          LARK_APP_TOKEN: ${{ github.event.client_payload.lark_app_token }}
          LARK_TABLE_ID: ${{ github.event.client_payload.lark_table_id }}
          PAGES_TABLE_ID: ${{ github.event.client_payload.pages_table_id }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            node dang-reel-facebook/scripts/post-feed-api.js --dry-run
          else
            node dang-reel-facebook/scripts/post-feed-api.js
          fi

      - name: Đăng YouTube (cùng bảng 14.3 — dòng video tick "Đăng YouTube")
        if: always()   # bước FB lỗi 1 dòng vẫn thử đăng YouTube cho các dòng khác
        env:
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_HEBE: ${{ secrets.YT_REFRESH_HEBE }}
          YT_REFRESH_NGOCANH: ${{ secrets.YT_REFRESH_NGOCANH }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            node dang-reel-facebook/scripts/post-youtube-143.js --dry-run
          else
            node dang-reel-facebook/scripts/post-youtube-143.js
          fi
